<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCSb Notes - Note Management System</title>
    <link rel="stylesheet" href="../main.css">
    <script src="../JavaScript.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <nav>
                <ul>
                    <li><a href="../main_page.html">Back to Home</a></li>
                    <li><a href="#upload">Upload Notes</a></li>
                </ul>
            </nav>
            <h1 id="main_head">OCSb Notes</h1>
            <p>OCSb notes and resources</p>
        </header>

        <main>
            <section id="upload">
                <h2>Upload OCSb Notes</h2>
                <div class="form-card">
                    <form class="subject-upload-form" data-subject="ocsb">
                        <label for="ocsbFile">Select OCSb PDF:</label>
                        <input type="file" id="ocsbFile" name="ocsbFile" accept=".pdf" required>
                        <button type="submit">Upload OCSb Note</button>
                    </form>
                </div>
            </section>

            <section id="notes-list">
                <h2>OCSb Notes List</h2>
                <div class="form-card">
                    <ul>
                        <li>
                            <h3>OCSb Basics</h3>
                            <p>Introduction to OCSb</p>
                            <a href="#">Download</a>
                        </li>
                        <li>
                            <h3>OCSb Advanced</h3>
                            <p>Advanced OCSb concepts</p>
                            <a href="#">Download</a>
                        </li>
                    </ul>
                </div>
            </section>
        </main>

        <footer>
            <p>Note Management System &copy; 2023</p>
        </footer>
    </div>
</body>

</html>
